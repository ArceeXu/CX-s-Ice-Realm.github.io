<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>MindAR Viewport</title>
    
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    
    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="myModel" src=""></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                id="arModelEntity"
                src="#myModel"
                scale="1 1 1"
                position="0 -0.5 0"
                rotation="0 0 0"
                animation-mixer>
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        // 1. 从 URL 中解析参数
        const urlParams = new URLSearchParams(window.location.search);
        const modelName = urlParams.get('model') || 'ilia.glb'; // 默认值
        const initialScale = urlParams.get('scale') || '1';
        const initialYPos = urlParams.get('ypos') || '-0.5';

        // 2. 在 A-Frame 加载前，把正确的模型路径赋给 <a-asset-item>
        const assetItem = document.getElementById('myModel');
        assetItem.setAttribute('src', './' + modelName);

        // 3. 动态调整模型的初始缩放和位置
        const modelEntity = document.getElementById('arModelEntity');
        modelEntity.setAttribute('scale', `${initialScale} ${initialScale} ${initialScale}`);
        modelEntity.setAttribute('position', `0 ${initialYPos} 0`);

        // 4. 监听来自父页面的 postMessage 实时调整指令
        window.addEventListener('message', function(event) {
            if (event.data && event.data.type === 'adjustModel') {
                const scale = event.data.scale || 1.0;
                const yOffset = event.data.yOffset !== undefined ? event.data.yOffset : -0.4;
                
                if (modelEntity) {
                    modelEntity.setAttribute('scale', `${scale} ${scale} ${scale}`);
                    modelEntity.setAttribute('position', `0 ${yOffset} 0`);
                    console.log(`[MindAR View] 实时调整成功: scale=${scale}, y=${yOffset}`);
                }
            }
        });
    </script>
</body>
</html>
